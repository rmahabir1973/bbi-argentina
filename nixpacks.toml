# nixpacks.toml — Railway build configuration for Next.js + Payload CMS
# Explicitly controls how Railway builds and starts the application.

[variables]
NODE_ENV = "production"

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm run build"]

[start]
# HOSTNAME and PORT are passed by Railway at runtime via env vars.
# next/standalone server.js reads process.env.PORT and HOSTNAME automatically.
cmd = "HOSTNAME=0.0.0.0 node .next/standalone/server.js"
